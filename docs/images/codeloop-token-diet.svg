<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe Print','Comic Sans MS',cursive">
  <!-- Style inspired by Ian Xiaohei Illustrations (MIT) — hand-drawn, white bg, sparse annotations -->
  <rect width="1600" height="900" fill="#ffffff"/>
  <g stroke="#111" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- ============ LEFT: mountain of raw files ============ -->
    <!-- messy stack of papers -->
    <path d="M120 640 q6 -4 118 -6 q-4 -34 5 -38 q80 -6 104 2 q8 2 6 36 q60 -2 66 6 q4 26 -2 40 q-140 10 -297 4 q-4 -30 0 -44"/>
    <path d="M150 596 q-2 -30 6 -34 q70 -8 92 0 q6 4 4 34"/>
    <path d="M185 562 q-3 -26 4 -30 q52 -8 74 0 q7 4 4 30"/>
    <path d="M212 532 q-2 -24 5 -27 q38 -7 55 0 q6 3 4 27"/>
    <path d="M238 505 q-1 -20 4 -23 q26 -5 40 0 q5 3 3 23"/>
    <!-- scribble text on papers -->
    <path d="M160 615 q30 -3 60 0 M160 626 q22 -2 48 1 M245 612 q26 -2 50 1 M250 624 q20 -3 42 0"/>
    <path d="M195 575 q28 -3 52 0 M200 585 q20 -2 40 1"/>
    <path d="M222 545 q22 -2 42 0"/>
    <!-- Xiaohei #1 buckling under a stack he carries -->
    <g>
      <!-- carried stack, tilted -->
      <path d="M480 470 l96 -10 l6 30 l-96 12 z"/>
      <path d="M486 442 l82 -9 l5 26 l-83 10 z"/>
      <path d="M494 418 l66 -7 l4 22 l-67 8 z"/>
      <path d="M500 398 l50 -5 l3 18 l-51 6 z"/>
      <!-- body: bent forward -->
      <ellipse cx="520" cy="560" rx="30" ry="36" fill="#111" transform="rotate(18 520 560)"/>
      <!-- arms up holding stack -->
      <path d="M505 532 q-6 -22 -2 -28 M542 540 q10 -20 18 -26"/>
      <!-- wobbly legs -->
      <path d="M508 592 q-4 18 -10 26 M532 594 q2 20 -2 28"/>
      <!-- sweat drops -->
      <path d="M478 520 q-4 8 0 10 M470 545 q-4 8 0 10"/>
    </g>
    <g fill="#fff" stroke="none">
      <circle cx="512" cy="550" r="4.5"/><circle cx="530" cy="556" r="4.5"/>
    </g>

    <!-- big arrow into machine -->
    <path d="M615 560 q60 -10 108 -18 M700 530 l25 10 l-20 16"/>

    <!-- ============ CENTER: the CodeLoop press ============ -->
    <g>
      <!-- funnel -->
      <path d="M790 380 l160 0 l-38 76 l-84 0 z"/>
      <!-- papers dropping in -->
      <path d="M830 350 l34 -8 l4 16 l-34 8 z M880 336 l30 -6 l4 14 l-31 7 z"/>
      <!-- machine body, slightly wobbly -->
      <path d="M768 456 q2 -4 200 -2 q10 0 8 90 q0 12 -10 12 q-190 4 -198 -2 q-8 -4 -8 -50 q0 -44 8 -48"/>
      <!-- CODELOOP label plate -->
      <path d="M800 486 q66 -4 136 0 q4 12 0 24 q-70 4 -136 0 q-4 -12 0 -24"/>
      <!-- rivets & gauge -->
      <circle cx="786" cy="472" r="3"/><circle cx="952" cy="472" r="3"/>
      <circle cx="922" cy="536" r="12"/><path d="M922 536 l7 -7"/>
      <!-- crank -->
      <path d="M976 500 q26 -2 30 6 q4 8 -6 30"/>
      <circle cx="1002" cy="540" r="7"/>
      <!-- output slot + tiny card ejecting -->
      <path d="M968 576 l40 0 l0 14 l-40 0"/>
      <path d="M1014 578 l38 -4 l3 14 l-38 4 z"/>
      <!-- legs of machine -->
      <path d="M790 558 l-4 30 M948 558 l4 30"/>
      <!-- Xiaohei #2 cranking (the core actor) -->
      <ellipse cx="1046" cy="600" rx="28" ry="34" fill="#111"/>
      <path d="M1030 578 q-16 -18 -24 -34"/>
      <path d="M1064 582 q14 -10 20 -20"/>
      <path d="M1036 632 q-2 18 -6 26 M1058 632 q4 18 8 26"/>
    </g>
    <g fill="#fff" stroke="none">
      <circle cx="1038" cy="592" r="4.5"/><circle cx="1056" cy="592" r="4.5"/>
    </g>

    <!-- dashed flight of the tiny card -->
    <path d="M1075 560 q90 -60 180 -66" stroke-dasharray="7 9"/>

    <!-- ============ RIGHT: relaxed agent with tiny card ============ -->
    <g>
      <!-- Xiaohei #3 standing straight, holding card overhead with one thin arm -->
      <ellipse cx="1330" cy="600" rx="30" ry="36" fill="#111"/>
      <path d="M1330 566 q4 -30 6 -48"/>
      <!-- the tiny card -->
      <path d="M1310 490 l58 -6 l5 26 l-58 7 z"/>
      <path d="M1320 500 q20 -2 36 0 M1322 509 q14 -2 26 0"/>
      <!-- second arm relaxed -->
      <path d="M1352 596 q14 6 20 14"/>
      <!-- steady legs -->
      <path d="M1318 634 q-2 16 -4 24 M1342 634 q2 16 4 24"/>
      <!-- content sparkles -->
      <path d="M1394 520 l10 -10 M1399 525 l10 -10 M1272 520 l-8 -8"/>
    </g>
    <g fill="#fff" stroke="none">
      <circle cx="1322" cy="592" r="4.5"/><circle cx="1340" cy="592" r="4.5"/>
    </g>

    <!-- ground line -->
    <path d="M100 700 q400 8 700 2 q500 -8 700 0" stroke-width="3"/>
  </g>

  <!-- ============ annotations (sparse, red / orange / blue) ============ -->
  <g font-size="30">
    <text x="100" y="330" fill="#d93025">without CodeLoop:</text>
    <text x="100" y="368" fill="#d93025">agent reads everything (~50,000 tokens)</text>
    <path d="M250 385 q20 60 30 100" stroke="#d93025" stroke-width="2.5" fill="none"/>
    <path d="M276 470 l6 16 l-16 -4" stroke="#d93025" stroke-width="2.5" fill="none"/>

    <text x="742" y="330" fill="#e8710a">scan → compress → share</text>
    <text x="812" y="514" fill="#e8710a" font-size="25" font-weight="bold">CODELOOP</text>

    <text x="1150" y="362" fill="#1a73e8">with CodeLoop:</text>
    <text x="1150" y="400" fill="#1a73e8">one pre-digested map</text>
    <text x="1150" y="438" fill="#1a73e8">≈ 2,000 tokens</text>
    <path d="M1300 468 q20 12 30 22" stroke="#1a73e8" stroke-width="2.5" fill="none"/>
    <path d="M1322 484 l10 8 l-14 4" stroke="#1a73e8" stroke-width="2.5" fill="none"/>
  </g>
</svg>
