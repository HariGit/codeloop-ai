    <ellipse cx="700" cy="516" rx="22" ry="27" fill="#111"/>
    <path d="M716 500 l0 -46 l38 10 l-38 12"/>
    <path d="M692 540 q-3 12 -6 18 M710 540 q3 12 4 18"/>
    <!-- exit ramp to answer card -->
    <path d="M948 490 q120 -30 200 -36 M1120 446 l30 6 l-24 16"/>
    <path d="M1190 350 q140 -8 220 0 q10 2 8 240 q-110 8 -228 2 q-8 -120 0 -242"/>
    <path d="M1220 410 q80 -3 160 0 M1220 460 q70 -3 140 0 M1220 510 q80 -3 150 0"/>
    <path d="M1220 552 l14 14 l20 -24"/>
    <path d="M100 730 q700 10 1400 0"/>
  </g>
  <g fill="#fff" stroke="none">
    <circle cx="223" cy="592" r="4"/><circle cx="239" cy="592" r="4"/>
    <circle cx="921" cy="400" r="4.5"/><circle cx="936" cy="406" r="4.5"/>
    <circle cx="694" cy="510" r="3.5"/><circle cx="707" cy="510" r="3.5"/>
  </g>
  <g font-size="30">
    <text x="120" y="380" fill="#e8710a">your goal picks the mode at the gate</text>
    <text x="700" y="220" fill="#111" font-size="27">think</text>
    <text x="460" y="680" fill="#111" font-size="27">observe</text>
    <text x="990" y="670" fill="#111" font-size="27">act</text>
    <text x="620" y="760" fill="#d93025" font-size="27">guards watch every lap</text>
    <text x="1180" y="310" fill="#1a73e8">answer + evidence files</text>
  </g>
