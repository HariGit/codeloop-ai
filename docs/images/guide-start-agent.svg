<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe Print','Comic Sans MS',cursive">
  <rect width="1600" height="900" fill="#ffffff"/>
  <g stroke="#111" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- entry gate -->
    <path d="M170 640 l0 -180 M290 640 l0 -180"/>
    <path d="M150 460 q80 -30 160 0"/>
    <path d="M186 500 q44 -4 88 0 l0 44 q-44 4 -88 0 z"/>
    <!-- goal paper Xiaohei carries in -->
    <ellipse cx="230" cy="600" rx="26" ry="32" fill="#111"/>
    <path d="M250 584 q16 -10 22 -10"/>
    <path d="M268 556 l44 -6 l4 22 l-44 6 z"/>
    <path d="M222 630 q-4 14 -8 22 M242 630 q4 14 6 22"/>
