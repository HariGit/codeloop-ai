    <circle cx="760" cy="520" r="190" stroke-dasharray="10 12"/>
    <!-- station signposts -->
    <path d="M760 300 l0 -46 M760 254 l64 10 l-64 16"/>
    <path d="M580 610 l-40 26 M540 636 l-8 -30"/>
    <path d="M948 600 l40 24"/>
    <!-- Xiaohei running on track, tilted, motion lines -->
    <ellipse cx="920" cy="410" rx="28" ry="34" fill="#111" transform="rotate(24 920 410)"/>
    <path d="M938 384 q16 -12 24 -12"/>
    <path d="M902 438 q-14 12 -24 14 M928 444 q0 16 -6 26"/>
    <path d="M868 380 q-16 -4 -26 -2 M872 400 q-14 -2 -24 2"/>
